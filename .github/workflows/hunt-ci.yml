name: HUNT CI

on:
  push:
    branches: [main]
    paths: ['hunt/**']
  pull_request:
    branches: [main]
    paths: ['hunt/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
        working-directory: hunt
      - run: npm test
        working-directory: hunt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: hunt
      - run: npm run lint
        working-directory: hunt

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: hunt
      - run: npm run build
        working-directory: hunt
