name: Auto Label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = [];

            if (title.includes('[hunt]') || body.includes('hunt request')) {
              labels.push('hunt');
            } else if (title.includes('[bounty]') || body.includes('bounty')) {
              labels.push('bounty', 'reward');
            } else if (title.includes('[discovery]') || body.includes('discovery')) {
              labels.push('discovery');
            } else if (title.includes('[meme]') || body.includes('meme challenge')) {
              labels.push('meme', 'hunt');
            } else if (title.includes('bug') || body.includes('error')) {
              labels.push('bug');
            } else if (title.includes('feature') || body.includes('enhancement')) {
              labels.push('enhancement');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
